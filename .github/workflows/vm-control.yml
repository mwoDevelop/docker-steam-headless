name: VM Control
run-name: >-
  VM ${{ inputs.command }} ·
  ${{ inputs.instance != '' && inputs.instance || vars.GCE_NAME != '' && vars.GCE_NAME || 'instance' }}

on:
  workflow_dispatch:
    inputs:
      command:
        description: Action to execute against the GCE VM
        required: true
        type: choice
        options:
          - status
          - start
          - stop
          - restart
      project:
        description: Optional override for the GCP project
        required: false
        type: string
      zone:
        description: Optional override for the GCP zone
        required: false
        type: string
      instance:
        description: Optional override for the GCE instance name
        required: false
        type: string
      wait_for_running:
        description: Wait until the VM reports RUNNING after start/restart
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: read

jobs:
  control:
    name: Control GCE VM
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DEFAULT_GCP_PROJECT: ${{ vars.GCP_PROJECT }}
      DEFAULT_GCP_ZONE: ${{ vars.GCP_ZONE }}
      DEFAULT_GCE_NAME: ${{ vars.GCE_NAME }}
      DEFAULT_ALLOW_CIDR: ${{ vars.ALLOW_CIDR }}
      DEFAULT_DUCKDNS_DOMAINS: ${{ vars.DUCKDNS_DOMAINS }}

    steps:
      - name: Validate workflow configuration
        shell: bash
        run: |
          set -euo pipefail

          project="${{ inputs.project }}"
          zone="${{ inputs.zone }}"
          instance="${{ inputs.instance }}"

          [[ -n "$project" ]] || project="$DEFAULT_GCP_PROJECT"
          [[ -n "$zone" ]] || zone="$DEFAULT_GCP_ZONE"
          [[ -n "$instance" ]] || instance="$DEFAULT_GCE_NAME"

          [[ -n "$project" ]] || {
            echo "Missing GCP project. Set repository variable GCP_PROJECT or provide workflow input 'project'." >&2
            exit 1
          }
          [[ -n "$zone" ]] || {
            echo "Missing GCP zone. Set repository variable GCP_ZONE or provide workflow input 'zone'." >&2
            exit 1
          }
          [[ -n "$instance" ]] || {
            echo "Missing GCE instance name. Set repository variable GCE_NAME or provide workflow input 'instance'." >&2
            exit 1
          }

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Execute VM command
        id: control
        shell: bash
        env:
          DUCKDNS_TOKEN: ${{ secrets.DUCKDNS_TOKEN }}
        run: |
          set -euo pipefail

          command="${{ inputs.command }}"
          project="${{ inputs.project }}"
          zone="${{ inputs.zone }}"
          instance="${{ inputs.instance }}"
          allow_cidr="${DEFAULT_ALLOW_CIDR}"
          duckdns_domains="${DEFAULT_DUCKDNS_DOMAINS}"

          [[ -n "$project" ]] || project="$DEFAULT_GCP_PROJECT"
          [[ -n "$zone" ]] || zone="$DEFAULT_GCP_ZONE"
          [[ -n "$instance" ]] || instance="$DEFAULT_GCE_NAME"

          gcloud config set project "$project" >/dev/null

          normalize_duckdns_domains() {
            local raw="${1:-}"
            local cleaned=""
            local value=""
            local out=()

            cleaned="${raw// /}"
            cleaned="${cleaned#,}"
            cleaned="${cleaned%,}"
            [[ -n "$cleaned" ]] || return 0

            IFS=',' read -r -a items <<< "$cleaned"
            for value in "${items[@]}"; do
              [[ -n "$value" ]] || continue
              value="${value%.duckdns.org}"
              value="${value#https://}"
              value="${value#http://}"
              value="${value%%/*}"
              value="${value%%:*}"
              [[ -n "$value" ]] || continue
              out+=("${value}.duckdns.org")
            done

            printf '%s\n' "${out[@]}"
          }

          get_status() {
            gcloud compute instances describe "$instance" \
              --project "$project" \
              --zone "$zone" \
              --format='value(status)' 2>/dev/null || true
          }

          get_ip() {
            gcloud compute instances describe "$instance" \
              --project "$project" \
              --zone "$zone" \
              --format='value(networkInterfaces[0].accessConfigs[0].natIP)' 2>/dev/null || true
          }

          current_status="$(get_status)"

          if [[ "$command" == "status" || "$command" == "stop" ]]; then
            [[ -n "$current_status" ]] || {
              echo "Instance '$instance' not found in project '$project' zone '$zone'." >&2
              exit 1
            }
          fi

          export GCP_PROJECT="$project"
          export GCP_ZONE="$zone"
          export GCE_NAME="$instance"
          export ALLOW_CIDR="$allow_cidr"
          export DUCKDNS_DOMAINS="$duckdns_domains"
          export VMCTL_NO_CLIP=1

          if [[ -n "$DUCKDNS_TOKEN" ]]; then
            export DUCKDNS_TOKEN
          fi

          if [[ -n "$allow_cidr" ]]; then
            export VMCTL_FIREWALL_CIDR="$allow_cidr"
            export VMCTL_SKIP_FIREWALL_PIN=0
          else
            export VMCTL_SKIP_FIREWALL_PIN=1
          fi

          case "$command" in
            status)
              bash ./gcp-vm/vm-ctl.sh status
              ;;
            start)
              bash ./gcp-vm/vm-ctl.sh up
              ;;
            stop)
              bash ./gcp-vm/vm-ctl.sh down
              ;;
            restart)
              if [[ "$current_status" == "RUNNING" ]]; then
                bash ./gcp-vm/vm-ctl.sh down
              fi
              bash ./gcp-vm/vm-ctl.sh up
              ;;
            *)
              echo "Unsupported command: $command" >&2
              exit 1
              ;;
          esac

          final_status="$(get_status)"
          external_ip="$(get_ip)"
          duckdns_list="$(normalize_duckdns_domains "$duckdns_domains" | paste -sd ',' -)"

          [[ "$command" != "status" || -n "$final_status" ]] || {
            echo "Instance '$instance' not found in project '$project' zone '$zone'." >&2
            exit 1
          }

          echo "command=$command" >> "$GITHUB_OUTPUT"
          echo "project=$project" >> "$GITHUB_OUTPUT"
          echo "zone=$zone" >> "$GITHUB_OUTPUT"
          echo "instance=$instance" >> "$GITHUB_OUTPUT"
          echo "status=${final_status:-UNKNOWN}" >> "$GITHUB_OUTPUT"
          echo "external_ip=${external_ip}" >> "$GITHUB_OUTPUT"
          echo "duckdns_domains=${duckdns_list}" >> "$GITHUB_OUTPUT"

          {
            echo "## VM Control"
            echo
            echo "- Command: \`$command\`"
            echo "- Project: \`$project\`"
            echo "- Zone: \`$zone\`"
            echo "- Instance: \`$instance\`"
            echo "- Final state: \`${final_status:-UNKNOWN}\`"
            if [[ -n "$external_ip" ]]; then
              echo "- External IP: \`${external_ip}\`"
            fi
            if [[ -n "$duckdns_list" ]]; then
              echo "- DuckDNS: \`${duckdns_list}\`"
            fi
            if [[ "${final_status:-}" == "RUNNING" && -n "$external_ip" ]]; then
              echo "- noVNC: http://${external_ip}:8083/"
              echo "- Sunshine UI: https://${external_ip}:47990/"
              if [[ -n "$duckdns_list" ]]; then
                while IFS= read -r duckdns_domain; do
                  [[ -n "$duckdns_domain" ]] || continue
                  echo "- noVNC DNS: http://${duckdns_domain}:8083/"
                  echo "- Sunshine DNS: https://${duckdns_domain}:47990/"
                done < <(normalize_duckdns_domains "$duckdns_domains")
              fi
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: "Final state: ${{ steps.control.outputs.status != '' && steps.control.outputs.status || 'UNKNOWN' }}"
        if: always()
        run: echo "Recorded final VM state."

      - name: "External IP: ${{ steps.control.outputs.external_ip != '' && steps.control.outputs.external_ip || 'none' }}"
        if: always()
        run: echo "Recorded external IP."

      - name: "Target: ${{ steps.control.outputs.project != '' && steps.control.outputs.project || 'unknown-project' }}/${{ steps.control.outputs.zone != '' && steps.control.outputs.zone || 'unknown-zone' }}/${{ steps.control.outputs.instance != '' && steps.control.outputs.instance || 'unknown-instance' }}"
        if: always()
        run: echo "Recorded target instance."

      - name: "DuckDNS: ${{ steps.control.outputs.duckdns_domains != '' && steps.control.outputs.duckdns_domains || 'none' }}"
        if: always()
        run: echo "Recorded DuckDNS domains."
